version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: ttm-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ttm
      MONGO_INITDB_ROOT_PASSWORD: ttmpass
      MONGO_INITDB_DATABASE: team_task_manager
    volumes:
      - mongo-data:/data/db

  mongo-express:
    image: mongo-express:1
    container_name: ttm-mongo-express
    restart: unless-stopped
    depends_on: [mongo]
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ttm
      ME_CONFIG_MONGODB_ADMINPASSWORD: ttmpass
      ME_CONFIG_MONGODB_URL: mongodb://ttm:ttmpass@mongo:27017/
      ME_CONFIG_BASICAUTH: "false"

volumes:
  mongo-data:
